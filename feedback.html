<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Dat Ta</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .feedback-container {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 50%; /* Default width cho desktop */
      max-width: 600px; /* Giới hạn chiều rộng tối đa */
      margin-left: auto;
      margin-right: auto; /* Căn giữa container */
      box-sizing: border-box; /* Đảm bảo padding không thay đổi kích thước */
    }

    textarea, input[type="email"], button {
      width: 100%; /* Đảm bảo phần tử con chiếm hết chiều rộng container */
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      background-color: darkgray;
      color: white;
      border: none;
      cursor: pointer;
    }

    @media (max-width: 768px) { /* Tablets */
      .feedback-container {
        width: 70%;
      }
    }

    @media (max-width: 480px) { /* Mobile */
      .feedback-container {
        width: 90%;
      }
    }
  </style>
  <script>
        function loadComponent(id, url) {
            fetch(url)
                .then(response => response.text())
                .then(data => document.getElementById(id).innerHTML = data)
                .catch(error => console.error(`Error loading ${url}:`, error));
        }

        document.addEventListener("DOMContentLoaded", function () {
            loadComponent("nav-placeholder", "nav.html");
            loadComponent("footer-placeholder", "footer.html");
        });
  </script>
</head>
<body>

  <!-- Navigation Section -->
  <div id="nav-placeholder"></div>

  <!-- Header Section -->
  <header>
    <h1>Feedback</h1>
  </header>

  <!-- Personal Content Section -->
  <div class="feedback-container">

    <form id="feedbackForm">
    
    <textarea name="feedback" placeholder="Enter your feedback..." rows="5" required></textarea>
    
    <input type="email" name="email" placeholder="Enter your email (optional reply)..." required>
    
    <button type="submit">SEND</button>
    
    <div id="successMessage" style="display:none;margin-top:12px;color:green;">
    Sent successfully
    </div>
    
    </form>
    
  </div>
    
    
    <script>
    
    document.getElementById("feedbackForm").addEventListener("submit",async function(e){
    
    e.preventDefault();
    
    const form = e.target;
    
    const data = new FormData(form);
    
    
    /* subject */
    data.append("_subject","New feedback from Dat Ta homepage");
    
    /* auto reply */
    data.append("_autoresponse","Thank you for your feedback. I have received your message.");
    
    /* disable captcha */
    data.append("_captcha","false");
    
    
    await fetch("https://formsubmit.co/ajax/your_email@example.com",{
    method:"POST",
    body:data
    });
    
    
    document.getElementById("successMessage").style.display="block";
    
    form.reset();
    
    });
    
    </script>

  <!-- Footer Section -->
  <div id="footer-placeholder"></div>

</body>
</html>
